name: Paraphilic Disorder Daily Report

on:
  schedule:
    - cron: "30 14 * * *" # UTC 14:30 = 台北時間 22:30
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi
          echo "Date: $(grep target "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Fetch papers from PubMed
        run: node scripts/fetch_papers.mjs
        env:
          TARGET_DATE: ${{ steps.date.outputs.target }}
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with GLM AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          TARGET_DATE: ${{ steps.date.outputs.target }}
        run: node scripts/generate_report.mjs

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 paraphilic disorder daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 📄 Paraphilic Disorder Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.date.outputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [paraphilic-disorder-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/paraphilic-disorder/paraphilic-disorder-${{ steps.date.outputs.target }}.html)" >> "$GITHUB_STEP_SUMMARY"
